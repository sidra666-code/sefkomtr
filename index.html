<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sefkom İletişim</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Sol üstten sağ alta geçen ince açık mavi çizgi */
.line{
    position:absolute;
    width:220%;
    height:2px;
    background:linear-gradient(90deg,
        transparent,
        rgba(125,211,252,.8),
        transparent);
    box-shadow:0 0 12px rgba(125,211,252,.6);
    transform:rotate(25deg);
    top:-20%;
    left:-170%;
    animation:move 10s linear infinite;
}

@keyframes move{
    from{ left:-170%; }
    to{ left:100%; }
}

.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:420px;
    background:rgba(15,23,42,.88);
    border:1px solid rgba(125,211,252,.18);
    border-radius:24px;
    padding:32px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.logo{
    width:78px;
    height:78px;
    margin:auto;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    color:#7dd3fc;
    border:2px solid rgba(125,211,252,.6);
    background:rgba(125,211,252,.08);
}

h1{
    color:#fff;
    text-align:center;
    margin:18px 0 8px;
    font-size:30px;
}

.desc{
    color:#cbd5e1;
    text-align:center;
    margin-bottom:24px;
    font-size:15px;
}

.btn{
    display:block;
    text-decoration:none;
    text-align:center;
    padding:18px;
    margin-top:14px;
    border-radius:18px;
    color:#fff;
    font-weight:600;
    background:rgba(125,211,252,.08);
    border:1px solid rgba(125,211,252,.35);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    background:rgba(125,211,252,.14);
    box-shadow:0 0 18px rgba(125,211,252,.25);
}

.site{
    background:linear-gradient(90deg,#2563eb,#38bdf8);
    border:none;
}

.site:hover{
    box-shadow:0 0 24px rgba(56,189,248,.35);
}

.name{
    font-size:18px;
    margin-bottom:4px;
}

.number{
    font-size:14px;
    color:#bae6fd;
}
</style></head><body><div class="line"></div><div class="card"><div class="logo">📘</div><h1>Sefkom</h1>
<p class="desc">Kişileri rehberinize kaydedebilir veya web sitemizi ziyaret edebilirsiniz.</p><a href="selim.vcf" class="btn">
    <div class="name">👤 Selim Bey'i Kaydet</div>
    <div class="number">+90 533 622 90 50</div>
</a><a href="onur.vcf" class="btn">
    <div class="name">👤 Onur Bey'i Kaydet</div>
    <div class="number">+90 533 505 06 56</div>
</a><a href="https://mebsis.tr/" target="_blank" class="btn site">
    🌐 Web Sitemizi Ziyaret Edin
</a></div></body>
</html>
