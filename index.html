<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mebsis İletişim</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#070b1d;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* Neon çapraz çizgiler */
.line{
    position:absolute;
    width:220%;
    height:3px;
    background:linear-gradient(90deg,transparent,#00eaff,#ff00ff,transparent);
    box-shadow:0 0 18px #00eaff,0 0 35px #ff00ff;
    animation:move 7s linear infinite;
}

.line:nth-child(1){
    top:15%;
    transform:rotate(25deg);
}

.line:nth-child(2){
    bottom:10%;
    transform:rotate(-25deg);
    animation-delay:3.5s;
}

@keyframes move{
    from{left:-170%;}
    to{left:100%;}
}

.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:420px;
    background:rgba(10,15,35,.75);
    backdrop-filter:blur(18px);
    border:1px solid rgba(0,255,255,.25);
    border-radius:25px;
    padding:30px;
    box-shadow:
    0 0 25px rgba(0,255,255,.25),
    0 0 50px rgba(255,0,255,.15);
}

.logo{
    width:85px;
    height:85px;
    margin:auto;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:36px;
    color:#00eaff;
    border:2px solid #00eaff;
    box-shadow:0 0 20px #00eaff;
}

h1{
    color:#fff;
    text-align:center;
    margin:18px 0 8px;
    font-size:30px;
}

.desc{
    color:#b8c5ff;
    text-align:center;
    margin-bottom:25px;
}

.contact{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px;
    margin-bottom:15px;
    border-radius:18px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    transition:.3s;
}

.contact:hover{
    transform:scale(1.03);
    border-color:#00eaff;
    box-shadow:0 0 20px rgba(0,255,255,.35);
}

.name{
    color:#fff;
    font-weight:600;
    font-size:18px;
}

.number{
    color:#8be9ff;
    font-size:14px;
    margin-top:4px;
}

.call{
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(135deg,#00eaff,#009dff);
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:#fff;
    font-size:24px;
    box-shadow:0 0 20px #00eaff;
    transition:.3s;
}

.call:hover{
    transform:rotate(10deg) scale(1.1);
}

.site{
    display:block;
    margin-top:15px;
    text-align:center;
    text-decoration:none;
    padding:18px;
    border-radius:18px;
    background:linear-gradient(90deg,#ff00ff,#00eaff);
    color:#fff;
    font-weight:700;
    font-size:18px;
    box-shadow:0 0 25px rgba(255,0,255,.5);
    transition:.3s;
}

.site:hover{
    transform:translateY(-3px);
}
</style>

</head>
<body>

<div class="line"></div>
<div class="line"></div>

<div class="card">

<div class="logo">📞</div>

<h1>Mebsis</h1>

<p class="desc">İletişim kurmak istediğiniz kişiyi seçin.</p>

<div class="contact">
    <div>
        <div class="name">Selim Bey</div>
        <div class="number">+90 533 622 90 50</div>
    </div>

    <a class="call" href="tel:+905336229050">📞</a>
</div>

<div class="contact">
    <div>
        <div class="name">Onur Bey</div>
        <div class="number">+90 533 505 06 56</div>
    </div>

    <a class="call" href="tel:+905335050656">📞</a>
</div>

<a class="site" href="https://mebsis.tr/" target="_blank">
🌐 Web Sitemizi Ziyaret Edin
</a>

</div>

</body>
</html>
