<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mebsis İletişim</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#081226;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* Sol üstten sağ alta geçen ince mavi çizgi */
.line{
    position:absolute;
    width:180%;
    height:2px;
    background:linear-gradient(90deg,transparent,#7dd3fc,transparent);
    box-shadow:0 0 10px #7dd3fc;
    transform:rotate(35deg);
    top:-20%;
    left:-120%;
    animation:slide 10s linear infinite;
}

@keyframes slide{
    0%{
        left:-120%;
        top:-20%;
    }
    100%{
        left:40%;
        top:120%;
    }
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(125,211,252,.25);
    backdrop-filter:blur(14px);
    border-radius:24px;
    padding:30px;
    box-shadow:0 0 25px rgba(125,211,252,.12);
}

.logo{
    width:72px;
    height:72px;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:#7dd3fc;
    border:2px solid #7dd3fc;
    box-shadow:0 0 16px rgba(125,211,252,.35);
}

h1{
    color:#fff;
    text-align:center;
    margin:18px 0 8px;
    font-size:28px;
}

p{
    color:#cbd5e1;
    text-align:center;
    margin-bottom:24px;
    font-size:14px;
}

.btn{
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(125,211,252,.2);
    padding:16px 18px;
    border-radius:16px;
    margin-bottom:14px;
    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
    border-color:#7dd3fc;
    box-shadow:0 0 16px rgba(125,211,252,.25);
}

.name{
    font-weight:600;
    font-size:17px;
}

.number{
    font-size:13px;
    color:#93c5fd;
    margin-top:3px;
}

.icon{
    font-size:22px;
}

.site{
    justify-content:center;
    gap:10px;
    background:linear-gradient(90deg,#2563eb,#38bdf8);
    border:none;
    font-weight:700;
    margin-top:8px;
}
